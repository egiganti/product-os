name: 🚀 Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Ship to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🧪 Run tests before deploy
        run: npm test

      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

      - name: 📝 Update progress
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M')] shipped: Deployed to production from commit ${{ github.sha }}" >> claude-progress.txt
          git config user.name "product-os[bot]"
          git config user.email "product-os@users.noreply.github.com"
          git add claude-progress.txt
          git commit -m "chore: update progress after deploy [skip ci]" || true
          git push || true

      - name: 🎉 Notify success
        if: success()
        run: echo "✅ Shipped to production successfully!"
