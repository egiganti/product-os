name: 🧪 QA Agent Review

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  qa-review:
    name: QA Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: 🧪 Run unit tests
        run: npm test -- --coverage --reporter=verbose

      - name: 📊 Check coverage thresholds
        run: |
          npm test -- --coverage --coverageThreshold='{"global":{"branches":70,"functions":80,"lines":80,"statements":80}}'

      - name: 🎭 Run E2E tests (Playwright)
        run: |
          npx playwright install --with-deps chromium
          npx playwright test --reporter=html
        continue-on-error: true

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            playwright-report/
          retention-days: 7

      - name: 💬 Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.existsSync('coverage/coverage-summary.json')
              ? JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'))
              : null;

            const body = coverage
              ? `## 🧪 QA Agent Report\n\n**Coverage:**\n- Lines: ${coverage.total.lines.pct}%\n- Functions: ${coverage.total.functions.pct}%\n- Branches: ${coverage.total.branches.pct}%\n\n✅ Tests complete. Check artifacts for full report.`
              : `## 🧪 QA Agent Report\n\nTests ran. Check artifacts for details.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
